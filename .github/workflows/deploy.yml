name: Deploy to AWS Elastic Beanstalk

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Start RDS if stopped
        run: |
          STATUS=$(aws rds describe-db-instances --db-instance-identifier study-db-tf --region ap-northeast-1 --query "DBInstances[0].DBInstanceStatus" --output text)
          echo "RDS status: $STATUS"
          if [ "$STATUS" = "stopped" ]; then
            aws rds start-db-instance --db-instance-identifier study-db-tf --region ap-northeast-1
            aws rds wait db-instance-available --db-instance-identifier study-db-tf --region ap-northeast-1
          fi

      - name: Create deployment package
        run: |
          zip -r app.zip app.js form.html package.json package-lock.json .platform

      - name: Get AWS account ID
        id: account
        run: echo "account_id=$(aws sts get-caller-identity --query Account --output text)" >> $GITHUB_OUTPUT

      - name: Upload zip to S3
        run: |
          aws s3 cp app.zip s3://elasticbeanstalk-ap-northeast-1-${{ steps.account.outputs.account_id }}/app-${{ github.run_number }}.zip

      - name: Create Elastic Beanstalk application version
        run: |
          aws elasticbeanstalk create-application-version \
            --application-name study-app-tf \
            --version-label v${{ github.run_number }} \
            --source-bundle S3Bucket=elasticbeanstalk-ap-northeast-1-${{ steps.account.outputs.account_id }},S3Key=app-${{ github.run_number }}.zip \
            --region ap-northeast-1

      - name: Deploy to Elastic Beanstalk
        run: |
          aws elasticbeanstalk update-environment \
            --environment-name study-env-tf \
            --version-label v${{ github.run_number }} \
            --region ap-northeast-1

      - name: Wait for environment
        run: |
          aws elasticbeanstalk wait environment-updated \
            --environment-names study-env-tf \
            --region ap-northeast-1

      - name: Check environment status
        run: |
          aws elasticbeanstalk describe-environments \
            --application-name study-app-tf \
            --environment-name study-env-tf \
            --query "Environments[0].[Status,Health,VersionLabel,CNAME]" \
            --output table \
            --region ap-northeast-1