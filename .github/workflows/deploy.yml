name: Deploy to ECS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Start RDS if stopped
        run: |
          STATUS=$(aws rds describe-db-instances --db-instance-identifier study-db-ecs --region ${{ secrets.AWS_REGION }} --query "DBInstances[0].DBInstanceStatus" --output text)
          echo "RDS status: $STATUS"
          if [ "$STATUS" = "stopped" ]; then
            aws rds start-db-instance --db-instance-identifier study-db-ecs --region ${{ secrets.AWS_REGION }}
            aws rds wait db-instance-available --db-instance-identifier study-db-ecs --region ${{ secrets.AWS_REGION }}
          fi

      - name: Get AWS account ID
        id: account
        run: echo "account_id=$(aws sts get-caller-identity --query Account --output text)" >> $GITHUB_OUTPUT

      - name: Login to Amazon ECR
        run: |
          aws ecr get-login-password --region ${{ secrets.AWS_REGION }} | docker login --username AWS --password-stdin ${{ steps.account.outputs.account_id }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com

      - name: Build Docker image
        run: |
          docker build --no-cache -t study-node-app .

      - name: Tag Docker image
        run: |
          docker tag study-node-app:latest ${{ steps.account.outputs.account_id }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/study-node-app:latest

      - name: Push Docker image to ECR
        run: |
          docker push ${{ steps.account.outputs.account_id }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/study-node-app:latest

      - name: Force new ECS deployment
        run: |
          aws ecs update-service \
            --cluster study-cluster \
            --service study-node-task-service-r7cd8nq1 \
            --force-new-deployment \
            --region ${{ secrets.AWS_REGION }}